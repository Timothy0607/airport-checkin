name: 机场自动签到

on:
  # 定时任务（使用上海时区）
  schedule:
    - cron: '10 01 * * *'   # 上海时区 9:10 (UTC 01:10)
    - cron: '15 01 * * *'   # 上海时区 9:15 (UTC 01:15)
  # 保留手动触发功能
  workflow_dispatch:

jobs:
  # 账号1 任务
  account1:
    runs-on: ubuntu-latest
    # 只有到了 9:10 这个时间点，才会执行这个任务
    if: github.event.schedule == '10 01 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install axios
      - run: node checkin.js
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER1 }}
          PASS: ${{ secrets.PASS1 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

  # 账号2 任务
  account2:
    runs-on: ubuntu-latest
    # 只有到了 9:15 这个时间点，才会执行这个任务
    if: github.event.schedule == '15 01 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install axios
      - run: node checkin.js
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER2 }}
          PASS: ${{ secrets.PASS2 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
