name: 机场自动签到

on:
  schedule:
    - cron: '40 6 * * *'   # 北京时间 14:40
    - cron: '45 6 * * *'   # 北京时间 14:45
  workflow_dispatch:

jobs:
  account1:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '40 6 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install axios
      - run: node checkin.js
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER1 }}
          PASS: ${{ secrets.PASS1 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

  account2:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '45 6 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install axios
      - run: node checkin.js
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER2 }}
          PASS: ${{ secrets.PASS2 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
