name: 机场自动签到

on:
  schedule:
    - cron: '40 06 * * *'   # 账号1：北京时间 14:40
    - cron: '45 06 * * *'  # 账号2：北京时间 14:45
  workflow_dispatch:
    inputs:
      account:
        description: '选择要签到的账号 (1 或 2)'
        required: false
        default: 'all'

jobs:
  checkin-account1:
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.account == '1' || github.event.inputs.account == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install axios
      - run: node checkin.js
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER1 }}
          PASS: ${{ secrets.PASS1 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

  checkin-account2:
    if: github.event.schedule == '30 0 * * *' || github.event.inputs.account == '2' || github.event.inputs.account == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install axios
      - run: node checkin.js
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER2 }}
          PASS: ${{ secrets.PASS2 }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
